services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/woohyun212/se-final-project/backend:latest}
    container_name: se-final-project-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
