<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', system-ui, sans-serif">
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#212121">
    시스템 컨텍스트 다이어그램 — AI 감정분석 음악추천 시스템
  </text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#424242"/>
    </marker>
  </defs>

  <!-- ============ 시스템 박스 (중앙) ============ -->
  <rect x="280" y="170" width="340" height="240" rx="12" ry="12"
        fill="#E3F2FD" stroke="#1976D2" stroke-width="2.5"/>
  <text x="450" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#0D47A1">
    AI 감정분석 음악추천 시스템
  </text>
  <text x="450" y="218" text-anchor="middle" font-size="11" fill="#1565C0" font-style="italic">
    (Electron Client + Backend API + ML Server)
  </text>

  <!-- 시스템 내부 컴포넌트 그룹 (요약) -->
  <rect x="300" y="240" width="140" height="34" rx="4" fill="#FFFFFF" stroke="#1976D2" stroke-width="1"/>
  <text x="370" y="262" text-anchor="middle" font-size="11" fill="#0D47A1">EmotionClassifier + STT</text>

  <rect x="460" y="240" width="140" height="34" rx="4" fill="#FFFFFF" stroke="#1976D2" stroke-width="1"/>
  <text x="530" y="262" text-anchor="middle" font-size="11" fill="#0D47A1">ContextAnalyzer (LLM)</text>

  <rect x="300" y="285" width="140" height="34" rx="4" fill="#FFFFFF" stroke="#1976D2" stroke-width="1"/>
  <text x="370" y="307" text-anchor="middle" font-size="11" fill="#0D47A1">EmotionFusion</text>

  <rect x="460" y="285" width="140" height="34" rx="4" fill="#FFFFFF" stroke="#1976D2" stroke-width="1"/>
  <text x="530" y="307" text-anchor="middle" font-size="11" fill="#0D47A1">RecommendationEngine</text>

  <rect x="300" y="330" width="140" height="34" rx="4" fill="#FFFFFF" stroke="#1976D2" stroke-width="1"/>
  <text x="370" y="352" text-anchor="middle" font-size="11" fill="#0D47A1">MusicCatalog (DB)</text>

  <rect x="460" y="330" width="140" height="34" rx="4" fill="#FFFFFF" stroke="#1976D2" stroke-width="1"/>
  <text x="530" y="352" text-anchor="middle" font-size="11" fill="#0D47A1">FeedbackLogger</text>

  <text x="450" y="395" text-anchor="middle" font-size="10" fill="#616161" font-style="italic">
    (내부 컴포넌트는 참고용 — 상세는 아키텍처/클래스 다이어그램 참조)
  </text>

  <!-- ============ 사용자 액터 (왼쪽) ============ -->
  <g transform="translate(100, 230)">
    <!-- Head -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#212121" stroke-width="2"/>
    <!-- Body -->
    <line x1="0" y1="14" x2="0" y2="50" stroke="#212121" stroke-width="2"/>
    <!-- Arms -->
    <line x1="-18" y1="25" x2="18" y2="25" stroke="#212121" stroke-width="2"/>
    <!-- Legs -->
    <line x1="0" y1="50" x2="-15" y2="75" stroke="#212121" stroke-width="2"/>
    <line x1="0" y1="50" x2="15" y2="75" stroke="#212121" stroke-width="2"/>
    <!-- Label -->
    <text x="0" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#212121">사용자</text>
  </g>

  <!-- ============ 외부 시스템: Spotify (우상) ============ -->
  <g transform="translate(740, 100)">
    <rect x="0" y="0" width="140" height="60" rx="6" fill="#F1F8E9" stroke="#33691E" stroke-width="2"/>
    <text x="70" y="22" text-anchor="middle" font-size="11" font-style="italic" fill="#558B2F">«external»</text>
    <text x="70" y="42" text-anchor="middle" font-size="13" font-weight="700" fill="#33691E">Spotify Web API</text>
  </g>

  <!-- ============ 외부 시스템: LLM (우중) ============ -->
  <g transform="translate(740, 260)">
    <rect x="0" y="0" width="140" height="60" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
    <text x="70" y="22" text-anchor="middle" font-size="11" font-style="italic" fill="#EF6C00">«external»</text>
    <text x="70" y="42" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">LLM API</text>
  </g>

  <!-- ============ 외부 시스템: YouTube (우하) ============ -->
  <g transform="translate(740, 420)">
    <rect x="0" y="0" width="140" height="60" rx="6" fill="#FFEBEE" stroke="#B71C1C" stroke-width="2"/>
    <text x="70" y="22" text-anchor="middle" font-size="11" font-style="italic" fill="#C62828">«external»</text>
    <text x="70" y="42" text-anchor="middle" font-size="13" font-weight="700" fill="#B71C1C">YouTube Data API</text>
  </g>

  <!-- ============ 화살표: 사용자 ↔ 시스템 ============ -->
  <!-- 사용자 → 시스템 -->
  <line x1="125" y1="245" x2="280" y2="245" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="155" y="227" width="100" height="16" fill="#FFFFFF" opacity="0.95"/>
  <text x="205" y="239" text-anchor="middle" font-size="11" fill="#212121">음성, 피드백</text>

  <!-- 시스템 → 사용자 -->
  <line x1="280" y1="285" x2="125" y2="285" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="145" y="290" width="120" height="16" fill="#FFFFFF" opacity="0.95"/>
  <text x="205" y="302" text-anchor="middle" font-size="11" fill="#212121">추천 + 시각화</text>

  <!-- ============ 화살표: 시스템 ↔ Spotify ============ -->
  <line x1="620" y1="210" x2="740" y2="135" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="615" y="160" width="135" height="16" fill="#FFFFFF" opacity="0.95"/>
  <text x="682" y="172" text-anchor="middle" font-size="11" fill="#212121">트랙/audio features 조회</text>

  <line x1="740" y1="155" x2="620" y2="240" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="615" y="195" width="135" height="16" fill="#FFFFFF" opacity="0.95"/>
  <text x="682" y="207" text-anchor="middle" font-size="11" fill="#212121">JSON (메타 + features)</text>

  <!-- ============ 화살표: 시스템 ↔ LLM ============ -->
  <line x1="620" y1="275" x2="740" y2="285" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="623" y="258" width="125" height="16" fill="#FFFFFF" opacity="0.95"/>
  <text x="685" y="270" text-anchor="middle" font-size="11" fill="#212121">STT텍스트 + 프롬프트</text>

  <line x1="740" y1="305" x2="620" y2="320" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="623" y="325" width="125" height="16" fill="#FFFFFF" opacity="0.95"/>
  <text x="685" y="337" text-anchor="middle" font-size="11" fill="#212121">맥락 + 추천 이유</text>

  <!-- ============ 화살표: 시스템 ↔ YouTube ============ -->
  <line x1="620" y1="370" x2="740" y2="430" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="615" y="395" width="135" height="16" fill="#FFFFFF" opacity="0.95"/>
  <text x="682" y="407" text-anchor="middle" font-size="11" fill="#212121">감성 플리 ID 요청</text>

  <line x1="740" y1="450" x2="620" y2="395" stroke="#424242" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="615" y="438" width="135" height="16" fill="#FFFFFF" opacity="0.95"/>
  <text x="682" y="450" text-anchor="middle" font-size="11" fill="#212121">플리 내 트랙 메타</text>

  <!-- Note: 캐글 데이터셋 제외 안내 -->
  <g transform="translate(40, 480)">
    <rect x="0" y="0" width="380" height="60" rx="4" fill="#FFFDE7" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="10" y="20" font-size="11" font-weight="700" fill="#F57F17">⚠ 캐글 dataset은 시스템 컨텍스트에 포함되지 않음</text>
    <text x="10" y="36" font-size="10" fill="#5D4037">학습(개발) 시점에만 사용 → 운영 시 EmotionClassifier</text>
    <text x="10" y="50" font-size="10" fill="#5D4037">모델 가중치로 흡수됨. 외부 시스템 아님.</text>
  </g>
</svg>
