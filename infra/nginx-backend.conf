# Blue-Green nginx 설정
# 적용: sudo cp infra/nginx-backend.conf /etc/nginx/sites-enabled/backend.pongchi.kro.kr && sudo nginx -t && sudo nginx -s reload
server {
    listen 80;
    server_name backend.pongchi.kro.kr home-backend.pongchi.kro.kr;
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
