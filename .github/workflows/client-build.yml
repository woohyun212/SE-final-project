name: client-build

# NFR6.1 — macOS(Apple Silicon) 데스크톱 앱 빌드 산출물 생성.
# 수동 트리거 또는 client-v* 태그 push 시 macos-latest(arm64) 에서 electron-builder 패키징 후
# 산출물(dmg/zip)을 아티팩트로 업로드한다.
# client-v* 태그로 트리거되면 같은 산출물을 해당 태그의 GitHub Release 에도 첨부한다.
# (Windows/Linux 빌드는 각 OS 머신에서 별도 수행 — 동일 태그 Release 에 수동 업로드 가능.)

on:
  workflow_dispatch:
  push:
    tags:
      - "client-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]   # Apple Silicon(arm64) — Windows/Linux 는 별도 머신에서 빌드
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # GitHub Release 생성/업로드 권한
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --ci

      - name: Build desktop app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NEXT_PUBLIC_* 는 next build 시점에 코드에 인라인된다. 주입하지 않으면
          # api.ts 가 http://localhost:8000 으로 폴백해 배포 앱이 localhost 로 요청한다.
          # (.env.local 은 gitignore 라 CI 에 없음.) 운영 백엔드 URL 을 빌드에 고정.
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://backend.pongchi.kro.kr' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.os }}
          path: |
            client/release/*.dmg
            client/release/*.zip
            client/release/*.exe
            client/release/*.AppImage
            client/release/*.deb
          if-no-files-found: ignore

      # client-v* 태그로 트리거된 경우에만 GitHub Release 에 산출물 첨부.
      # 매트릭스 3-OS 가 같은 태그의 Release 에 각자 산출물을 추가(append)한다.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/client-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/release/*.dmg
            client/release/*.zip
            client/release/*.exe
            client/release/*.AppImage
            client/release/*.deb
          fail_on_unmatched_files: false
          generate_release_notes: true
