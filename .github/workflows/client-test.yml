name: client-test

# NFR4.4 — client 단위/통합 테스트 커버리지 게이트 (≥70%).
# client/ 변경 PR·push 시 jest 커버리지(jest.config.js coverageThreshold)를 강제한다.

on:
  pull_request:
    paths:
      - "client/**"
  push:
    branches: [frontend, main]
    paths:
      - "client/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        # jest 테스트만 실행하므로 Electron 바이너리 다운로드는 불필요하다.
        # 다운로드 서버 504 등 일시 장애로 CI 가 깨지지 않도록 스킵한다.
        run: npm install
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Run tests with coverage gate
        run: npm run test:coverage -- --ci
