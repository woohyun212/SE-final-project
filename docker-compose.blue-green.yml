networks:
  default:
    name: se-final-project_default
    external: true

services:
  backend-blue:
    image: ${BACKEND_IMAGE:-ghcr.io/woohyun212/se-final-project/backend:latest}
    container_name: se-final-project-backend-blue
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend-green:
    image: ${BACKEND_IMAGE:-ghcr.io/woohyun212/se-final-project/backend:latest}
    container_name: se-final-project-backend-green
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

